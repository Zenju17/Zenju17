<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#071018">
        <animate attributeName="stop-color" values="#071018;#0B1F14;#071018" dur="8s" repeatCount="indefinite"></animate>
      </stop>
      <stop offset="50%" stop-color="#123524">
        <animate attributeName="stop-color" values="#123524;#1E7F52;#123524" dur="8s" repeatCount="indefinite"></animate>
      </stop>
      <stop offset="100%" stop-color="#3FCF8E">
        <animate attributeName="stop-color" values="#3FCF8E;#65F5A7;#3FCF8E" dur="8s" repeatCount="indefinite"></animate>
      </stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <linearGradient id="waveGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0E1C2F" stop-opacity="0.2"></stop>
      <stop offset="100%" stop-color="#66FFB2" stop-opacity="0.3"></stop>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" rx="0" fill="url(#bgGradient)"></rect>

  <circle cx="180" cy="70" r="90" fill="#66FFB2" opacity="0.12">
    <animate attributeName="cx" values="180;980;180" dur="14s" repeatCount="indefinite"></animate>
  </circle>

  <circle cx="1000" cy="180" r="100" fill="#5EEAD4" opacity="0.10">
    <animate attributeName="cx" values="1000;240;1000" dur="16s" repeatCount="indefinite"></animate>
  </circle>

  <path fill="url(#waveGradient)" opacity="0.8">
    <animate attributeName="d" dur="10s" repeatCount="indefinite" values="
      M0 170 C180 130 350 220 560 180 C760 140 920 210 1200 150 L1200 260 L0 260 Z;
      M0 150 C200 200 350 120 560 170 C760 220 930 130 1200 180 L1200 260 L0 260 Z;
      M0 170 C180 130 350 220 560 180 C760 140 920 210 1200 150 L1200 260 L0 260 Z"></animate>
  </path>

  <text x="600" y="105" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="58" font-weight="700" fill="#8BFFB8" filter="url(#glow)">
    HOK DO
  </text>

  <text x="600" y="145" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="24" font-weight="500" fill="#E8FFF3">
    FULL STACK DEVELOPER
  </text>

  <text x="600" y="182" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="18" fill="#D6FEE8">
    Flutter • Laravel • JavaScript • PHP • Mobile &amp; Web Development
  </text>
</svg>