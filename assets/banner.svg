<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#020617">
        <animate attributeName="stop-color" values="#020617;#052e16;#020617" dur="8s" repeatCount="indefinite"></animate>
      </stop>
      <stop offset="50%" stop-color="#14532d">
        <animate attributeName="stop-color" values="#14532d;#166534;#14532d" dur="8s" repeatCount="indefinite"></animate>
      </stop>
      <stop offset="100%" stop-color="#22c55e">
        <animate attributeName="stop-color" values="#22c55e;#16a34a;#22c55e" dur="8s" repeatCount="indefinite"></animate>
      </stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <pattern id="grid" width="35" height="35" patternUnits="userSpaceOnUse">
      <path d="M 35 0 L 0 0 0 35" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"></path>
    </pattern>
  </defs>

  <rect width="1200" height="280" fill="url(#bgGradient)"></rect>
  <rect width="1200" height="280" fill="url(#grid)" opacity="0.5"></rect>

  <circle cx="160" cy="80" r="90" fill="#86efac" opacity="0.13">
    <animate attributeName="cx" values="160;1040;160" dur="14s" repeatCount="indefinite"></animate>
  </circle>

  <circle cx="1010" cy="195" r="110" fill="#bbf7d0" opacity="0.10">
    <animate attributeName="cx" values="1010;180;1010" dur="16s" repeatCount="indefinite"></animate>
  </circle>

  <path fill="#020617" opacity="0.45">
    <animate attributeName="d" dur="9s" repeatCount="indefinite" values="
      M0 190 C220 140 380 235 610 190 C840 145 980 220 1200 170 L1200 280 L0 280 Z;
      M0 170 C230 225 390 135 620 185 C850 235 990 145 1200 195 L1200 280 L0 280 Z;
      M0 190 C220 140 380 235 610 190 C840 145 980 220 1200 170 L1200 280 L0 280 Z"></animate>
  </path>

  <text x="600" y="105" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="58" font-weight="800" fill="#bbf7d0" filter="url(#glow)">
    HOK DO
  </text>

  <text x="600" y="150" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="26" font-weight="600" fill="#f0fdf4">
    FULL STACK DEVELOPER
  </text>

  <text x="600" y="190" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="18" fill="#dcfce7">
    Flutter • Laravel • JavaScript • PHP • MySQL • Firebase • AWS
  </text>

  <text x="600" y="222" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="16" fill="#bbf7d0">
    Building clean, modern, and practical digital products
  </text>
</svg>